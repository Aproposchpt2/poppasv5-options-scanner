name: Emergency Restore Scanner Preview

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Restore known-good near-production preview
        run: |
          git checkout 918b9c7cde3d91137bfcda33e98a0b654361bb56 -- scanner-table-preview.html

      - name: Remove temporary restore workflows
        run: |
          rm -f .github/workflows/emergency-restore-scanner-preview.yml
          rm -f .github/workflows/restore-scanner-preview-design.yml

      - name: Commit restored page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scanner-table-preview.html .github/workflows
          if git diff --cached --quiet; then
            echo "No restoration changes required."
            exit 0
          fi
          git commit -m "Restore original near-production scanner preview"
          git push origin main
