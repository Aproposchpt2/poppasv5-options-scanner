name: Patch Load Next 500 Records

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-load-next-500-records.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch preview pagination CTA
        run: |
          echo '' | base64 -d > /tmp/patch_load_next.py
          python3 /tmp/patch_load_next.py
      - name: Commit
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scanner-table-preview.html
          git commit -m "Add Load Next 500 Records CTA to preview page"
          git push
