name: Restore Scanner Preview Design

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-scanner-preview-design.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore protected preview page from known-good commit
        run: |
          git checkout 918b9c7cde3d91137bfcda33e98a0b654361bb56 -- scanner-table-preview.html

      - name: Commit restored preview design
        run: |
          if git diff --quiet; then
            echo "Preview page already matches the known-good version."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scanner-table-preview.html
          git commit -m "Restore near-production scanner preview design"
          git push
