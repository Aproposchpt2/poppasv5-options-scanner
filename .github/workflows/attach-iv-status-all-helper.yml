name: Attach IV Status All Helper

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/attach-iv-status-all-helper.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Attach helper script
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('scanner-table-preview.html')
          s = p.read_text(encoding='utf-8')
          tag = '<script src="/preview-iv-status-all.js?v=1"></script>'
          if tag not in s:
              s = s.replace('</body>', tag + '</body>', 1)
              p.write_text(s, encoding='utf-8')
              print('Attached IV Status All helper.')
          else:
              print('Helper already attached.')
          PY
      - name: Commit
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scanner-table-preview.html
          git commit -m "Attach IV Status All helper to preview page"
          git push
