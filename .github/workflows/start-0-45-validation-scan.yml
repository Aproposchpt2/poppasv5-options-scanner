name: Start 0-45 Validation Scan

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/start-0-45-validation-scan.yml
  workflow_dispatch:

jobs:
  start-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Netlify production deployment
        run: sleep 120

      - name: Start fresh scan without cleanup
        run: |
          set -euo pipefail
          response=$(curl --fail-with-body --silent --show-error --max-time 120 \
            "https://poppasv2.ai4academy.net/.netlify/functions/scan-clean-start-db?source=github-action-0-45-validation")
          echo "$response"
          echo "$response" | grep '"ok": true'
          echo "$response" | grep '"action": "preserved_record_start"'
