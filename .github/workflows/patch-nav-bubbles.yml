name: Patch Nav Bubbles

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-nav-bubbles.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch nav css
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('scanner-table-preview.html')
          s = p.read_text(encoding='utf-8')
          old = ".navlinks a{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:rgba(244,248,255,.72)}"
          new = ".navlinks a{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:rgba(244,248,255,.86);border:1px solid rgba(191,214,255,.28);border-radius:999px;padding:8px 13px;background:rgba(255,255,255,.045);transition:.18s ease}.navlinks a:hover,.navlinks a.nav-active{color:#04101f;background:linear-gradient(135deg,#fff,var(--cyan));border-color:rgba(123,220,255,.75);box-shadow:0 0 22px rgba(30,167,255,.28)}"
          old2 = ".navlinks a{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:rgba(244,248,255,.72);border:1px solid transparent;border-radius:999px;padding:8px 12px;transition:.18s ease}.navlinks a:hover,.navlinks a.nav-active{color:#04101f;background:linear-gradient(135deg,#fff,var(--cyan));border-color:rgba(123,220,255,.65);box-shadow:0 0 22px rgba(30,167,255,.24)}"
          changed = False
          if old in s:
              s = s.replace(old, new, 1); changed = True
          if old2 in s:
              s = s.replace(old2, new, 1); changed = True
          if changed:
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scanner-table-preview.html
          git commit -m "Make preview nav links visible bubble buttons"
          git push
